services:
  mysql:
    image: mysql:8.4
    container_name: shipment-mysql
    restart: unless-stopped
    command:
      - mysqld
      - --max_connections=50
      - --table_open_cache=1000
      - --performance-schema-consumer-statements-digest=OFF
      - --performance-schema-consumer-events-statements-history=OFF
      - --performance-schema-consumer-events-statements-history-long=OFF
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_DATABASE: ${DB_DATABASE:-shipment_otomotif}
      MYSQL_USER: ${DB_USERNAME:-shipment}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "127.0.0.1:${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    mem_limit: 768m
    mem_reservation: 256m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local